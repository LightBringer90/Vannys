server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root /usr/share/nginx/html;

    sendfile on;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Framer's CMS loader fetches collection data (*.framercms) using a custom
    # "?range=from-to,from-to" query parameter and expects ONLY those byte ranges
    # back, concatenated. A plain static server returns the whole file, so the
    # loader throws "Unexpected response length" and the component crashes on
    # scroll. This Lua handler honours the range query (and serves the full file
    # when there's no range param). Must precede the generic host-dir regex.
    location ~* \.framercms$ {
        default_type application/octet-stream;
        # Never cache: responses are partial (range-dependent), and a cached
        # full-file copy would fail the loader's length check.
        add_header Cache-Control "no-store" always;
        content_by_lua_block {
            ngx.header["Cache-Control"] = "no-store"
            local path  = ngx.var.document_root .. ngx.var.uri
            local f = io.open(path, "rb")
            if not f then ngx.status = 404; ngx.say("not found"); return end
            local range = ngx.var.arg_range
            if not range then
                local data = f:read("*a"); f:close(); ngx.print(data); return
            end
            local chunks = {}
            for part in string.gmatch(range, "([^,]+)") do
                local a, b = string.match(part, "(%d+)%-(%d+)")
                if a then
                    a, b = tonumber(a), tonumber(b)
                    f:seek("set", a)
                    chunks[#chunks + 1] = f:read(b - a + 1)
                end
            end
            f:close()
            ngx.print(table.concat(chunks))
        }
    }

    # Framer's image-CDN URLs look like  /images/NAME.jpg?width=…&height=…
    # wget saved them with the query string baked into the filename, so nginx
    # can't infer the type from a real extension. Restore correct image types.
    location ~* \.jpe?g\?           { default_type image/jpeg; expires 30d; add_header Cache-Control "public, immutable"; }
    location ~* \.png\?             { default_type image/png;  expires 30d; add_header Cache-Control "public, immutable"; }
    location ~* \.(?:webp|gif|avif)\? { expires 30d; add_header Cache-Control "public, immutable"; }

    # Framer's analytics loader is fetched as /events.framer.com/script?v=2;
    # the query is stripped by nginx, so serve the file as JavaScript.
    location = /events.framer.com/script { default_type application/javascript; }

    # All mirrored third-party host directories are served from the web root
    # at /<host>/...  (links were rewritten to these root-relative paths).
    location ~* ^/(?:framerusercontent\.com|fonts\.gstatic\.com|app\.framerstatic\.com|events\.framer\.com|unpkg\.com)/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # The actual site pages live under rama.framer.media/ — serve them at the
    # web root with clean, extensionless URLs (/, /about, /works/..., etc.).
    location / {
        root /usr/share/nginx/html/rama.framer.media;
        try_files $uri $uri.html $uri/index.html =404;
    }
}
